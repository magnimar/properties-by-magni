---
- name: Deploy Fundvís
  hosts: raspberrypi
  become: true
  vars:
    frontend_dir: /opt/properties-by-magni/frontend
    backend_dir: /opt/properties-by-magni/backend
    scraper_dir: /opt/properties-by-magni/scraper
  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - git
          - nodejs
          - npm
          - python3
          - python3-venv
          - python3-pip
          - libpq-dev
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
          - acl
          - cloudflared
        state: present
        update_cache: true

    - name: Ensure PostgreSQL is started and enabled
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Create database user 'magni'
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: magni
        password: "{{ secrets.DB_PASSWORD | default('Robotariamerika') }}"
        role_attr_flags: SUPERUSER

    - name: Create database 'properties'
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: properties
        owner: magni

    # --- Cloudflare Tunnel Setup ---
    - name: Ensure cloudflared config directory exists
      ansible.builtin.file:
        path: /etc/cloudflared
        state: directory
        mode: '0755'

    - name: Configure cloudflared tunnel routes
      ansible.builtin.copy:
        dest: /etc/cloudflared/config.yml
        content: |
          tunnel: 4696dc77-d6cc-40e4-a6fb-46840055a959
          credentials-file: /etc/cloudflared/4696dc77-d6cc-40e4-a6fb-46840055a959.json

          ingress:
            - hostname: fundvis.is
              service: http://127.0.0.1:5000
            - hostname: www.fundvis.is
              service: http://127.0.0.1:5000
            - hostname: api.fundvis.is
              service: http://127.0.0.1:8000
            - service: http_status:404
        mode: '0644'
      notify: Restart cloudflared

    - name: Ensure cloudflared service is enabled and started
      ansible.builtin.systemd:
        name: cloudflared
        state: started
        enabled: true

    # --- Fundvís Repo Setup ---
    - name: Ensure /opt/properties-by-magni directory exists
      ansible.builtin.file:
        path: /opt/properties-by-magni
        state: directory
        mode: '0755'
        owner: raspberrypi
        group: raspberrypi

    - name: Clone or pull the Fundvís repository
      ansible.builtin.git:
        repo: https://github.com/magnimar/properties-by-magni.git
        dest: /opt/properties-by-magni
        version: main
        clone: true
        update: true
        force: true

    - name: Change ownership of cloned Fundvís files
      ansible.builtin.file:
        path: /opt/properties-by-magni
        state: directory
        owner: raspberrypi
        group: raspberrypi
        recurse: true

    # --- Global Configuration Check ---
    - name: Verify root .env file exists
      ansible.builtin.stat:
        path: "/opt/properties-by-magni/.env"
      register: root_env_file
      failed_when: not root_env_file.stat.exists

    - name: Verify all required environment variables are set in root .env
      ansible.builtin.command: "grep -E '^{{ item }}=' /opt/properties-by-magni/.env"
      loop:
        - DATABASE_URL
        - FRONTEND_URL
        - VITE_API_URL
        - BREVO_API_KEY
        - FROM_EMAIL
      changed_when: false

    # --- Dependencies Installation ---
    - name: Install frontend npm dependencies
      community.general.npm:
        ci: true
        path: "{{ frontend_dir }}"
      become: true
      become_user: raspberrypi

    - name: Build frontend production bundle
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ frontend_dir }}"
      become: true
      become_user: raspberrypi
      changed_when: false

    - name: Install backend python dependencies
      ansible.builtin.pip:
        requirements: "{{ backend_dir }}/requirements.txt"
        virtualenv: "{{ backend_dir }}/venv"
        virtualenv_command: /usr/bin/python3 -m venv
      become: true
      become_user: raspberrypi

    - name: Install scraper python dependencies
      ansible.builtin.pip:
        requirements: "{{ scraper_dir }}/requirements.txt"
        virtualenv: "{{ scraper_dir }}/venv"
        virtualenv_command: /usr/bin/python3 -m venv
      become: true
      become_user: raspberrypi

    # --- Service File Setup & Logging ---
    - name: Ensure log files exist and have correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: raspberrypi
        group: raspberrypi
        mode: '0644'
      loop:
        - /var/log/frontend.log
        - /var/log/backend.log
        - /var/log/scraper.log

    - name: Copy service files
      ansible.builtin.copy:
        src: "/opt/properties-by-magni/services/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: '0644'
        remote_src: true
      loop:
        - frontend.service
        - backend.service
        - scraper.service

    - name: Validate systemd file syntax
      ansible.builtin.command:
        cmd: "systemd-analyze verify /etc/systemd/system/{{ item }}"
      loop:
        - frontend.service
        - backend.service
        - scraper.service
      register: systemd_check
      failed_when: systemd_check.rc != 0
      changed_when: false

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and restart services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        enabled: true
      loop:
        - frontend
        - backend
        - scraper

  handlers:
    - name: Restart cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: restarted
