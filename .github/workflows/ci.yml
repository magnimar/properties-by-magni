name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  ansible_lint:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint and ansible-core
        run: pip install ansible-lint ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.postgresql community.general

      - name: Run Ansible Lint
        run: ansible-lint devops/ansible/playbook.yml

  lint_and_check:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [backend, scraper]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ matrix.directory }}/requirements.txt
        pip install ruff black pyflakes

    - name: Run Ruff Linter
      run: ruff check ${{ matrix.directory }}

    - name: Run Black Formatter Check
      run: black --check ${{ matrix.directory }}

    - name: Compile Python files
      run: python -m compileall ${{ matrix.directory }}

    - name: Run Pyflakes
      run: pyflakes ${{ matrix.directory }}

  build_frontend:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
